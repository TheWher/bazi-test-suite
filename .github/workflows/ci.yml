name: Test Suite

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 8 * * 1"  # 每周一运行

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Clone main project
        run: git clone https://github.com/TheWher/bazi-paipan.git bazi-paipan
      - name: Engine tests
        run: pytest tests/test_engine.py -m engine -v --tb=short --junitxml=reports/engine.xml
      - name: Smoke tests
        run: pytest tests/test_engine.py -m smoke -v --tb=short
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-report
          path: reports/engine.xml

  agent-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Clone main project
        run: git clone https://github.com/TheWher/bazi-paipan.git bazi-paipan
      - name: Agent quality tests
        run: pytest tests/test_agent.py -m agent -v --tb=long --junitxml=reports/agent.xml
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-report
          path: reports/agent.xml

  blind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Clone main project
        run: git clone https://github.com/TheWher/bazi-paipan.git bazi-paipan
      - name: Blind test (paipan only)
        run: pytest tests/test_blind.py -m blind -k "not api" -v --tb=short --junitxml=reports/blind.xml
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blind-report
          path: reports/blind.xml
